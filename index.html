<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>医学部英語 重要語彙マスター</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>

<!-- ANIMATED BG LAYERS -->
<div id="ocean-bg">
  <div class="ocean-gradient" id="ocean-gradient"></div>
  <div class="creatures-layer" id="creatures-layer"></div>
  <div class="coral-layer" id="coral-layer"></div>
  <div class="wave wave1"></div>
  <div class="wave wave2"></div>
  <div class="wave wave3"></div>
  <div class="bubbles" id="bubbles"></div>
  <div class="particles" id="particles"></div>
</div>

<!-- HEADER -->
<header id="app-header">
  <div class="header-left">
    <span class="logo-shark">🏥</span>
    <span class="logo-text">MVM</span>
  </div>
  <div class="header-stats">
    <span id="stat-explored">0%</span>
    <span class="stat-sep">|</span>
    <span id="stat-mastered">0/130</span>
    <span class="stat-sep">|</span>
    <span id="stat-weak">⚑0</span>
  </div>
</header>

<!-- HOME SCREEN -->
<div id="screen-home" class="screen active">
  <div class="home-hero">
    <div class="shark-teacher" id="shark-home">
      <div class="shark-body">🏥</div>
      <div class="shark-bubble" id="shark-greeting">Let's master medical vocab! 🏥</div>
    </div>
    <h1 class="app-title">Medical<br>Vocab<br>Master</h1>
    <p class="app-sub">512語 × 関東私大医学部マスタープラン</p>
  </div>

  <div class="day-progress-strip">
    <div id="day-scroll" class="day-scroll"></div>
  </div>

  <div class="home-actions">
    <button class="btn-primary" onclick="App.startTodaySession()">
      <span class="btn-icon">🌊</span>
      <span class="btn-text">今日の学習を始める</span>
    </button>
    <button class="btn-secondary" onclick="App.showScreen('screen-review')">
      <span class="btn-icon">🔁</span>
      <span class="btn-text">復習モード</span>
    </button>
    <button class="btn-ghost" onclick="App.showScreen('screen-topics')">
      <span class="btn-icon">🗺️</span>
      <span class="btn-text">トピック別学習</span>
    </button>
  </div>

  <div class="overall-progress">
    <div class="prog-label">Total Progress</div>
    <div class="prog-bar-wrap"><div class="prog-bar" id="total-progress-bar"></div></div>
    <div class="prog-pct" id="total-progress-pct">0%</div>
  </div>
</div>

<!-- TOPICS SCREEN -->
<div id="screen-topics" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="App.showScreen('screen-home')">← Back</button>
    <h2>Topics</h2>
  </div>
  <div class="topic-grid" id="topic-grid"></div>
</div>

<!-- TOPIC MODE MODAL -->
<div id="topic-mode-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-topic-badge" id="modal-topic-name">Perception Sea</div>
    <div class="modal-topic-creature" id="modal-creature">🧠</div>
    <h3 class="modal-title">学習モードを選んでください</h3>
    <button class="modal-btn mode-full" id="modal-full-btn">
      <span class="modal-btn-icon">🌊</span>
      <div class="modal-btn-content">
        <div class="modal-btn-title">Full Mode</div>
        <div class="modal-btn-sub">トピック全語を一気に学習</div>
      </div>
      <span class="modal-btn-count" id="modal-full-count">43語</span>
    </button>
    <button class="modal-btn mode-step" id="modal-step-btn">
      <span class="modal-btn-icon">🐾</span>
      <div class="modal-btn-content">
        <div class="modal-btn-title">Small Step Mode</div>
        <div class="modal-btn-sub">1回10語ずつコツコツと</div>
      </div>
      <span class="modal-btn-count" id="modal-step-count">10語</span>
    </button>
    <button class="modal-cancel" onclick="App.closeTopicModal()">キャンセル</button>
  </div>
</div>

<!-- REVIEW SCREEN -->
<div id="screen-review" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="App.showScreen('screen-home')">← Back</button>
    <h2>復習モード</h2>
  </div>
  <div class="review-options">
    <button class="review-btn" onclick="App.startReview('weak')">
      <span class="r-icon">⚑</span>
      <span class="r-label">Weak Words</span>
      <span class="r-count" id="weak-count">0語</span>
    </button>
    <button class="review-btn" onclick="App.startReview('random')">
      <span class="r-icon">🎲</span>
      <span class="r-label">ランダム総復習</span>
      <span class="r-count">130語から</span>
    </button>
    <div id="topic-review-list" class="topic-review-list"></div>
  </div>
</div>

<!-- FLASHCARD SCREEN -->
<div id="screen-flashcard" class="screen">
  <div class="screen-header">
    <button class="back-btn" id="fc-back-btn">← Back</button>
    <div class="fc-progress-info">
      <span id="fc-progress">1 / 10</span>
    </div>
    <span id="fc-topic-label" class="topic-badge"></span>
  </div>

  <div class="flashcard-wrap">
    <div class="flashcard" id="flashcard" onclick="App.flipCard()">
      <div class="card-front">
        <div class="card-pos" id="card-pos"></div>
        <div class="card-word" id="card-word">perception</div>
        <div class="card-hint">タップで意味を見る 👆</div>
      </div>
      <div class="card-back">
        <div class="card-meaning" id="card-meaning">知覚；認識</div>
        <div class="card-example" id="card-example"></div>
        <div class="card-translation" id="card-translation"></div>
        <div class="card-etymology" id="card-etymology"></div>
        <div class="card-derivatives" id="card-derivatives"></div>
      </div>
    </div>
  </div>

  <div class="fc-actions">
    <button class="fc-btn fc-skip" onclick="App.fcSkip()">スキップ</button>
    <button class="fc-btn fc-knew" onclick="App.fcKnew()">知ってた ✓</button>
  </div>
  <div class="fc-nav">
    <button class="fc-btn-sm" onclick="App.fcPrev()">‹ Prev</button>
    <button class="fc-btn-next" onclick="App.fcNext()">Next ›</button>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="screen-quiz" class="screen">
  <div class="screen-header">
    <button class="back-btn" id="quiz-back-btn">← Back</button>
    <div class="quiz-meta">
      <span id="quiz-progress">1/10</span>
      <span id="quiz-mode-label" class="mode-badge">英→日</span>
    </div>
  </div>

  <div class="quiz-timer-wrap">
    <div class="quiz-timer-bar" id="quiz-timer-bar"></div>
    <span class="quiz-timer-text" id="quiz-timer-text">10</span>
  </div>

  <div class="quiz-question-wrap">
    <div class="quiz-word" id="quiz-word">perception</div>
    <div class="quiz-listen-btn" id="quiz-listen-btn" style="display:none">
      <button onclick="App.playCurrentWord()">🔊 もう一度聴く</button>
    </div>
  </div>

  <div class="quiz-choices" id="quiz-choices"></div>

  <div class="quiz-feedback" id="quiz-feedback" style="display:none">
    <div class="feedback-header">
      <div class="feedback-icon" id="feedback-icon"></div>
      <div class="feedback-msg" id="feedback-msg"></div>
    </div>
    <div class="feedback-correct" id="feedback-correct"></div>
    <div class="feedback-hint" id="feedback-hint" style="display:none">
      <div class="hint-etymology" id="hint-etymology"></div>
      <div class="hint-derivatives" id="hint-derivatives"></div>
      <div class="hint-example" id="hint-example"></div>
    </div>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="screen-results" class="screen">
  <div class="results-wrap">
    <div class="results-shark">🏥</div>
    <h2 class="results-title" id="results-title">Session Complete!</h2>
    <div class="results-score" id="results-score">8 / 10</div>
    <div class="results-comment" id="results-comment"></div>
    <div class="results-stats-grid" id="results-stats"></div>
    <div class="results-actions">
      <button class="btn-primary" onclick="App.goHome()">ホームへ</button>
      <button class="btn-secondary" onclick="App.retryWeak()">Weak Words 再挑戦</button>
    </div>
  </div>
  <div class="celebration" id="celebration"></div>
</div>

<!-- CORRECT BURST OVERLAY -->
<div id="correct-burst" class="correct-burst" style="display:none">
  <div class="burst-content" id="burst-content"></div>
</div>

<!-- SHARK OVERLAY -->
<div id="shark-overlay" class="shark-overlay" style="display:none">
  <div class="shark-msg-box">
    <span class="shark-big">🏥</span>
    <p id="shark-overlay-msg"></p>
    <button onclick="App.closeShark()">OK!</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
